front:
  text: 黄帝陰符經講義圖說卷之四藏九
  hash: sha256:8767d25243dea12fa675e0a10bb199be81b161bfb5936ff869c55b61f48e25cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0110_HFL_004-001a, image: hfl/0054/0054-154.png}
body:
  text: 雲峰散人夏元鼎宗禹譔雲峰曰誰能出不由户何莫由斯道也蓋户者關也有關而後行於正道也儻无關則有猖狂妄行之患放僻邪侈之習矣故曰内有三關以性爲王以神氣爲宗所謂常收歸裏不放出外者是也外有三關以口爲樞以耳目爲鍵所謂九竅之邪在乎三要者是也此皆日用常行中庸大道之道也夫道若大路然人豈不由之哉其初也婦人女子皆可與知及其至也雖聖人亦有所不知故曰可欲之謂善有諸己之謂信充實而有光輝之謂大大而化之之謂聖聖而不可測知之謂神是神也豈非靈明妙用顯化通神即金丹之秘旨矣日月聖功圖說雲峯曰天地之道一陰一陽元炁配合萬物生焉懸象著明莫大乎日月者太陽眞火象應東南從木而生外應春夏發生萬物月者太陰眞水象應西北從金而長肅殺萬物此二者乃天地生殺之機故稱曰水火曰坎離曰鉛汞曰龍虎其他異名不勝數皆日月之號也聖人觀天之道察其盛衰明其幽隱將日月二氣劃成八卦以日之火爲二月之水爲一自一二既分卦氣以别故變之爲六十四上十五日坤生震而變兊兊變成乾乾氣圓滿懸照東方金水温温金氣既足自生眞水下十五日乾損成巽巽復成艮艮損成坤乾坤乃合日月相交至精至微不可思議雖人物鬼神推至異類毫髮不能隱大哉日月天地之體也夫人能窮日月之聖功則晦朔弦望體天法象可以與天地日月同其運用豈不能超凡入聖出死入生者乎奇器萬象圖說雲峰按陰符經曰爰有奇器是生萬象八卦甲子神機鬼藏大哉言乎人之一身即一奇器也萬象皆備神鬼護持可謂至貴太上曰人身難得中土難生假使得生正法難遇是也平叔曰先立乾坤爲鼎器次將烏兔藥來烹豈捨吾身之外而求乾坤於冥漠之表取烏兔於日月之宫乎是知竒器在乎身萬象備於我几二儀三光四象五行八卦九宫十干十一曜十二支二十四氣周天六十甲子皆備於人之一身苟能仰觀俯察與天地陰陽同其造化則機緘密契鬼神莫測三才並立長生乆視仙道豈遠哉三教歸一圖說雲峰曰三教殊途同歸妄者自生分别彼謂釋道虚无不可與吾儒並論是固然也自立人極應世變言之則不侔至於修眞養性與正心誠意之道未易畦畛也惟禪宗一門脱空異甚思欲破其迷妄每未得其要領一日專扣蒙庵聰老請問宗性傳燈大意如何辨答不已大要謂法身即虚空虚空即法身且叮嚀俾于參省特燒香秉燭以三寶證明頃間茶罷忽唤行童代事抽身同往後架出則洗手剔甲再整方袍請予歸座却道老僧頗飢相伴湯餅予因難之曰適間見教虚空法身法身虚空今又飢渴難免分别觸淨猜人不得於虚空事還作麽生蒙庵愕然无語可答及到方丈見有雪竇語録乘時閲之中有僧問智問和尚如何是般若體云蚌含秋月僧云如何是般若用云兔子懷胎非惟把定世界亦乃安貼邦家若善能於參詳便請丹霄獨步僧云如何是佛向上事云柱杖頭挑日月又祖師問南泉和尚云摩尼珠人不識如來藏裏親收得如何是如來藏南云與爾往來者是藏師云草裏漢南云不往不來者亦是藏師云雪上加霜師云如何是珠南云嶮百尺竿頭作伎倆不是好手這裏著得箇眼賓主互换便能深入虎穴若不恁麽縱饒師祖悟徹去也是龍頭蛇尾漢予遂指示蒙庵略露一斑以救其病渠當時大悟再還炷香於予信知三教等无差别本來面目只是一箇但服色不同耳故詳録此以詔天下明眼君子先天後天圖說雲峯曰先天者太極未判混成孰爲陽孰爲陰自道生一則其體已露其用已萌故一爲數奇爲卦乾純陽之象也後天者鳴濛剖破柝一爲二一爲數耦爲卦坤純陰之象也乾坤既異陰陽既分運化不同何以爲道惟金丹之妙反本還源尋根摘蒂守雌抱一去陰取陽不以乾坤之異而求其同不以陰陽之分而求其合故異者分者爲後天而同者合者實先天也先天者乃元始祖炁本來面目後天者乃臭腐神奇四大假合者也達人大觀苟知吾身是幻惟道是眞則迴光返照下手速修尤太遲矣上下鵲橋圖說一名曲江烏橋雲峯曰吕洞賓沁園春云曲江上月華瑩淨有箇烏飛蓋烏即鵲也曲江即有橋也日中有三足烏烏屬酉酉屬金烏是西方之金精日中之陽魂乃能飛於曲江之上是鵲能度登仙之橋也然橋必分於上下何也蓋氣脉相通能度下橋必能度上橋矣能度者則爲仙不能度者則爲凡矣釋氏之繫馬椿繫驢橛者亦此意也但其守死善道塊然面壁不能使烏飛鵲度故落第二義也然其祖法不然柰後世子孫迷錯耳其詳見三教歸一圖說七十二候圖說雲峯按元始祕言曰恍恍惚惚火中生神杳杳冥冥水中生精火炎昇上七返生神水流就下六化生精七六變化上下相成精神往來妙體含眞神七變生眞火精六化生眞水七六十有三之妙數无出天地之水火故天候三十六陽而生火地候三十六陰而生水合七十二候而周天之數足矣仙經曰天上三十六地下三十六太玄无邊際妙哉大洞經然不言五行而專言水火何也蓋水火者日月也陰符經曰日月有數大小有定聖功生焉神明出焉人能仰觀俯察而得其火候之祕則與天地合德日月合明可謂平地登仙矣五行生成圖說雲峯曰太極分而生兩儀天地是也天地既有形名難逃度數故天一生水地二生火天三生木地四生金天五生土是五行造化彌綸天地之經則五氣推遷寒暑往來周天度數可得而明矣故以三十六日甲三十六日乙而木之氣數足矣三十六日丙三十六日丁而火之氣數足矣三十六日戊三十六日己而土之氣數足矣三十六日庚三十六日辛而金之氣數足矣三十六日壬三十六日癸而水之氣數足矣合五七三十五而計之則得三百五十日又零二五一十日通前共三百六十日則一年十二月之度數无差其他天度之零可以積閏而推所以陶成萬彙造化夫人爲萬物之靈獨昧於五行之運徒見晝夜循環四時代謝而不知五行造化實主宰之玄哉妙哉雲峰人藥鏡箋序左史直院舍人朝請大夫留元剛譔東嘉夏宗禹奇偉俶儻之畫策從事制幕轉徙邊徼數奇不耦浩然遊方訪飛昇還返之術宜參默授會稡箋解謁予書之昔蘇東坡謂安期生世知其爲仙者也然太史公曰蒯通善齊人安期生生以策干項羽羽不能用欲封此兩人兩人終不肯受亡去每讀此未嘗不廢書而歎仙者非斯人而誰爲之故意戰國之士如魯仲連虞卿皆得道者歟虞卿不忍魏齊間行去趙困梁失相窮愁著書蒯通說信不聽陽狂爲巫逃亨客參自序其說是得爲知道耶必也不肯仕宦好持高節辯魏客帝秦之害罷燕將聊城之守壽以金而辭則曰所貴於天下之士者爲人排患釋難解紛亂而无取也即有取者是商賈之事而不忍爲也欲爵之而逃則曰吾與富貴而詘於人寧貧賤而輕世肆志焉嗟乎有若魯仲連而後可以爲仙也安期生附載之史傳旁見雜記似誕不經應如魯仲連抵掌吐長虹難堪踞牀洗寧挹扛鼎雄事既兩大繆飄然爾遺風乃知經世士出世或乘龍斯得之矣宗禹所釋金丹三書超軼世外固異八篇雋永刺譏權變是將爲魯仲連安期生書彼虞卿蒯通說士耳又安足與二子並言哉寳慶丙戌小雪後五日清源齊雲山人序雲峯續記夏雲多奇峯晋人得意句也予以幻質托此幻號誠畫蛇之足續鳧之頸也或者乃以效顰太史公之好奇而竊詩人之巧語以自表耳噫夏爲四時雲爲一氣峰從何來奇從何有出岫无心從龍无跡爲霖爲旱起風起雨千奇百怪變化莫測皆非予之所志也得非以天一以清地一以寧時維朱明炎帝持衡好風自南盾日如蒸火傘熾張金石流凝是雲非氣是峰非形洞洞天君聚精會神明堂丕闡端供紫庭赫奕丁公煆鍊金晶崑崙勃鬱玉井泓澄太一竈煖偃月鑪熒徊風混合霹靂鏗轟上通天竅下徹玄冥羅衛四獸左右六丁周天數足九轉飛升雲峰此時曷獨奇名淵哉大道天地德并元始祖炁陰陽未分孰爲重濁熟爲輕清鴻濛剖判生天地人上覆下載人爲最靈運化亭毒劫劫長存烏飛兔走懸象雙明弦望晦朔一遇三旬胡然九夏雲獨峯呈庚將三伏火必西奔金丹玄妙以火爲神雲騰火氣峯幻神形烹坎離髓奪乾坤精陰邪潜消純陽乃成天地相畢出死入生雲峯之奇不可思議非夫眞一孰抉其祕或者无語徒驚曰異乃知儒失之拘釋失之滯道等太虚中有根蔕天地廣大道能生之萬物散殊道能長之日月東西道能運之是雲爲峯道實得之吾見其一眞不動擒縱百靈二氣周交生成萬有不知其雲者峯乎峯者雲乎故七返九還者此雲峰也八歸六居者亦此雲峯也玄珠成象者此雲峯也而眞人出現者亦此雲峯也玄哉妙哉是豈詩句之奇可得而形容哉斗城夏元鼎記雲峰自序動亂爲業根靜定爲藥鏡此崔公之法言也豈非以人之有生四大假合涕唾精津血氣液无非陰邪酒色名利貪嗔癡无非紛擾惟一藥鏡之靜定能攝伏之何謂藥丹砂木精得金乃并是也何謂鏡靈明眞覺回光返照是也故聖人以神道設教以日月爲易仙道以神明爲宗以日月爲丹釋氏之杖挑日月宗性傳燈者皆是物也崔公慈悲接物善於托喻故吕洞賓謂因看崔公入藥鏡令人心地轉分明信爲天人之師也予三閲藏教凡得藥鏡七本其文各不同此經總二百四十三字言簡理當如太上之祕奥春秋之正經微顯闡幽探賾索隱靡有餘義眞金丹之樞轄也偶菖節過八寳憩於彭忠甫左塾因其炷香問道謾爲下一注脚以貽當世明眼君子并寄豫章靈源子胡季轍天台元漠子王和甫皆學仙弟子也夏元鼎序後序修職郎新處州州學教授王九萬譔李鄴侯七歳能文讀書萬卷已乃衣道士衣學神仙學若將終身惟懶殘勘破曰无多語領取十年宰相其後侯謀人國智略輳不下張子房世言方外士必遺世絶物然歟否耶意有道者特以此爲陳迹而非所以迹耳永嘉夏雲峯少由童子郎振策場屋遍從諸大老游長出入兵間以功得賞驅馳於山東河北登日懽拜孔林以充大其胸中浩然之氣視世間物无足當其意遂棄官學道一日出所注三書使下走望洋向若是也烏足以知之然竊聞先訓九萬之曾王父殿撰公諱子獻宣和間嘗偕吕元直丞相霍安國尚書三人銜命漕燕是時降虜郭藥師劉舜仁張令徽輩包藏不測三使者同銜上章乞棄燕忤大閹譚積各落職不得去黠虜愈張三使者極力隄虞每夕不寐曾王父因是得以神守氣之術其後壽八十九无疾而終前一日尚呼燈作小楷以復李伯紀丞相中間顔夷仲門下嘗間以書曾王父爲言人知氣爲體之充而不知以神御氣則神與氣相離而不相守非養生之善者夫以神御氣者在於正心誠意宴坐而數出入息蓋息者氣也數之者神也氣猶馬神猶馭以神馭氣之出入而不相離則可以長生矣莊子曰眞人之息以踵衆人之息以喉夫息不於喉而在丹田氣海中能不以思欲干其神不以蹶趨動其氣綿綿然數之以至于不可勝數自淺而之深自粗而之微自有而入於无則和氣充塞于頂踵之間不知氣之爲神神之爲氣其妙有不容言者矣是幾於坐忘者歟至其助以經伸按摩之術自亦无害在乎不倦而已晦翁先生嘗曰此胎息法也然亦參同契之緒餘耳又孰若雲峰金丹三書超然自應顯化通神靈明妙用者哉雖然雲峰發身於童子而得道於衡山又十餘年頡頏兵間其與鄴侯之事異世同轍今聖天子寤寐不凡之士共起治功雲峰其以鄴侯之心爲心爲國家了中原而後訪子房未遲也寳慶丁亥武夷山人序黄帝陰符經講義圖說卷之四
