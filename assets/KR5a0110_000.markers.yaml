  - {type: variant, offset: 13, length: 1, content: 譔, WYG: 序稱元鼎少從永嘉諸老遊好觀陰符未盡解後遇至人于祝融峯頂若有所授者後取陰符讀之章斷句析援筆立成若有神物陰來相助云云葢方術家務神其説往往如是末又有寶慶丙戌留元剛雲峯入藥鏡箋序一篇及元鼎自記自序二篇寳慶丁亥王九萬後序一篇俞琰席上腐談稱元鼎注陰符藥鏡悟真三書真西山為之序與諸序所言悉合今未見其入藥鏡悟真篇二注而此本已無徳秀序殆傳寫佚之然徳秀西山文集亦不載其文則莫喻何故矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀隂符經講義原序}
