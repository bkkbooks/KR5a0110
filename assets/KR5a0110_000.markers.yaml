  - {type: variant, offset: 7, length: 2, content: 序藏, WYG: 道家𩔖提要臣等謹按陰符經講義四卷宋夏元鼎撰元鼎字宗禹自號雲峯㪚人永嘉人是編以丹法釋陰符之㫖卷末附内外三闗圖日月聖功圖竒器萬象圖三教歸一圖先天後天圖上下鵲橋圖}
  - {type: indent, offset: 8, content: 　　　　　　, id: KR5a0110_krp_000-bkkind1}
  - {type: variant, offset: 10, length: 11, content: 朝散郎權發遣興化軍州事, WYG: 十二候圖五行生成圖各繫以説案漢志道家神仙家截然兩隂符三百八十四字本李筌自撰而自注之筌注不言爐火則為道家之言而非神仙家言可知後人注筌之書乃不用筌之自注郢書燕説殆𩔖鑿空然參同契不言易陳搏引以言易遂自為一家陰符經不言丹此書引以言丹亦遂自為一家遞相傳授而不能廢故今于陰符一書録六家之注以存其初義復録此書以備其旁支所謂從同同也其餘衍此兩者則不更録焉二氏之書姑存崖畧而已不必一一窮其説也是書前有寳慶二年}
  - {type: page-break, offset: 10, content: '', id: KR5a0110_WYG_000-1b, image: WYG1055/WYG1055-0019b.png}
