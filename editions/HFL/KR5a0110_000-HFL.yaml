front:
  text: 黄帝陰符經講義序藏七
  hash: sha256:18e717b8804cde86ea9783405cf99c01171d7f3785a27ea41ceef68a3704501f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0110_HFL_000-001a, image: hfl/0054/0054-098.png}
body:
  text: 朝散郎權發遣興化軍州事樓昉譔班孟堅志漢藝文録兵書四種以權謀言者十三家以形勢言者十一家以陰陽言者十六家以技巧言者亦十三家雖門分户析各專其一然血脉未嘗不相爲貫也孟堅之言曰權謀者以正守國以奇用兵兼形勢包陰陽用技巧者也然則四家實一家也雖然孟堅以形勢陰陽技巧總之以權謀吾獨以權謀形勢技巧總之於陰陽蓋天地之間一陰一陽而已矣權謀則有縱閉矣形勢則有離合矣技巧則有翕張矣而所以爲之縱閉離合翕張者陰陽之變化也故曰一陰一陽之謂道范蠡之謀吴也精察於贏縮蚤晏之節而推極於稻蟹之無種然一鼓而俘之既以此謀人之國亦以此自謀其家所謂後人發先人至趍時若猛獸鷙鳥者非陰陽之用乎而權謀形勢技巧固行乎其間矣古文善爲兵者未有不通乎陰陽者也風后之握奇武侯之八陣李衛公之孤虚烏占特其著者爾抑又有進此者張留侯親屈圯下之膝受書於老人蘇長公深排之以爲安知秦之世无隱君子者吾亦以爲秦之世安知无神仙者子房蓋偶有所遇耳陰符經黄帝所著文詞古奥奇澀讀者尚不能句況敢下一注脚子乎夏君宗禹自浙來閩手一編示予則所著講義也夏君少從永嘉諸大老游而竊獨好觀此書然未盡解也他日之上饒嘗默禱曰未登龍虎榜先登龍虎山夜感異夢後遇至人於祝融峰頂若有所授者復取是書讀之章斷句析援筆立成若有神物陰來相助此豈模擬料度如世之箋傳義疏云爾哉是必有油然自得而默契者矣雖然兵與神仙未易言也言兵則流於詭譎變詐言神仙則流於恍惚誕謾神仙豈自外求哉清明在躬志氣如神則神仙即兵通乎神仙則知兵通乎兵則知神仙矣种明逸終身隱華山而累世爲名將姚平仲京城小不利或者以爲遁去不死也特吾儒之所謂神仙者固在此而不在彼耳讀夏君之書者又當以是觀之寶慶二年秋八月中澣謹書
