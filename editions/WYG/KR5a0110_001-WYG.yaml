  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0110_WYG_001-1a, image: WYG1055/WYG1055-0021c.png}
body:
  text: 隂符經講義卷一宋夏元鼎撰經曰觀天之道執天之行盡矣天命之謂性率性之謂道道也者非可仰求於冥漠之表也天道在吾身我能盡其觀之之妙則目擊道存至道不繁矣要當執天之行須臾不離於十二時中一語一黙一呼一吸隂闔陽闢西沒東升風雲發泄於七竅坎離交㑹於元宫天以是道而運行乎萬化我以是道而操履於一身寒暑同其往来日月與之交合乾健以之不息日用自然無窮不知我之為天而天之為我也所謂我命在我不在天其以是乎謂之盡矣不可以有加矣天有五賊見之者昌五賊者五行也人稟五行於天天有五賊於人是豈天不仁耶非也五行顛倒大道生焉順則成人逆則成丹如金木必欲交并水火必欲既濟土旺四季而復以尅水為功是五行相賊道之𤣥奥世人安得見此理乎故見之者昌亦誠則明明則著虛室生白充實而有光輝之妙也既曰觀天之道又曰見之者昌聖人揭大道以示人昩者當面蹉過惜哉五賊在心施行於天五行五賊其理幽微心為天君實能主宰此施行於天皆在吾心之用蓋心即天也天即心也人能即一心之天以竊造化之妙即動静陟降在帝左右而施行之際未知其孰為天孰為心也宇宙在乎手手為三闗之要學道者當知所先矣黄庭經曰口為心闗精神機足為命闗生地扉手為人闗把盛衰得非以手者能按天象方隅推五運六氣握固以養和彈指以攝化診視以知隂陽之候抉目以通鬼神之靈無一而不在手也宇宙六合廣大无際茍得𤣥妙其猶示諸掌乎参同契序曰運六十四卦之隂符天闗在掌是也萬化生乎身人之一身一天地也有隂陽升降有烏兎出沒有潮候往来有風雨明晦有雷電轟閃有雲氣吐吞有山河流峙有草木榮枯動静語黙闔闢變化无一不與天地相似信乎萬化所由生也然有道者萬化生无道者萬化息生者與天為徒而息者與鬼為鄰也可不自愛乎天性人也人心機也立天之道以定人也天人一心機道同轍自六慾七情有以奪其性真則業識火熾不知其孰為天孰為人又孰為機孰為道也上聖洪慈闡明奥㫖謂性即天也天即人也至理渾融不可致詰必得其機而應之則自然脗合是機也豈世俗機巧變詐之為乎非也乃機緘之運不疾而速機闗之應若合符節耳人能明此之機心同造化自然機應不失則天道立矣人道定矣固非曰捨人道而别立天道亦非曰先立天道而後定人道也盖人道即天道天道即天機天機即天性所謂存其心養其性所以事天也天發殺機龍蛇起陸地發殺機星辰隕伏人發殺機天地反覆天人合發萬化定基三才異位生殺同機然殺者乃所以生之而生者乃所以殺之也且隂疑於陽必戰其血𤣥黄是殺機之所寓也况三陽交泰萬彚咸亨天發殺機下除隂邪之則雷轟電掃天威赫然龍蛇蟄藏不容不起陸於陽盛之時地發殺機上承陽剛之運則湧泉起浪黄河逆流北斗杓不容不溍伏於隂陽交勝之際人識此機則潜奪造化旋乾轉坤翻天覆地使地天交而為泰生殺定而為功太白真人歌曰五行顛倒術龍從火裏出五行不順行虎向水中生反覆之機也雖然天地與人列為三才生殺與機同於一氣孟子曰我善養吾浩然之氣充塞乎天地之間亦豈捨吾身之外而别有天地可充塞乎故知一氣之運非以在天者有餘而在人者不足天人合發不差毫機緘黙應變化萬端丹基一定大道滋生矣性有巧拙可以伏藏形色天性也而技巧出焉伏藏待時也而天機寓焉有是性則有是機非曰終於伏藏而无所用心也所謂懐材養浩明時正金丹之秘㫖也或謂隂鉛主伏陽汞主飛聖人伏陽汞以鍊隂魄故有大巧若拙之用非也殊不知黄帝專言巧拙者在性伏藏者待時蓋以性則合於𤣥元而鉛汞則拘於形質茍此性靈明陽魂日盛巧拙莫蔽伏藏待時天機一應則天性見矣此正洞賔所謂七返還丹在人先須鍊以待時也知待時之説則知伏藏巧拙之性矣九竅之邪在乎三要可以動静人身九竅上七下二無非邪學道者審此必攝乎三要然後動静有无邪之思三要者何耳目口是也参同契云三寳固塞勿發揚三者既闗鍵動静不竭窮人能謹此三要則天下之聲萬變而坎之聰不為所奪天下之色萬變而離之明不為所蔽天下之味萬變而兊之納不為所亂自然清明在躬志氣如神動静之間一循天理之正雖萬邪不能干矣九竅之邪何有於我哉此正非禮勿視非禮勿聽非禮勿言之道豈異端乎火生於木禍發必尅姦生於國時動必潰知之修鍊謂之聖人木能生火終於自焚國若生姦終於召亂此勢所必致之患學道者知之使火生於木而木不焚姦生於國而國不亂譬猶飲食男女人之大欲存焉固不可以其姦邪而屏絶之也茍縱是欲則何所不為惟以道而制之則火木相生不為禍而為福姦邪雖動不為邪而為正豈非修鍊之道乎所謂居塵不染出死入生者也然木火相生於五行為最盛人身五行視木火為盛衰如真元不虧則木火熾然潜應天機常人縱之以傷生是輕命恣姦也聖人鍊之以成道是返邪歸正也茍真元衰敗則木火滅矣天道缺矣人道逺而鬼道近矣哀哉隂符經講義卷一
