body:
  text: 隂符經講義卷二宋夏元鼎撰經曰天生天殺道之理也氣應黄鍾萬物萌動此天生也律中夷則萬物揫斂天之殺也然天既生之而復殺之何也盖有生殺之理存乎其間何以知生人能充是道於吾身密参造化則春生秋殺隂陽代謝不在一年之運而十二時中自可以奪天之妙用而得道之妙理矣天地萬物之盗萬物人之盗人萬物之盗三盗既宜三才既安天道好生地道好長人為萬物之靈萬物為人之用烏可以為盗耶得非天地不仁以萬物為芻狗是天地盗萬物而不使之長榮矣五色令人目盲五音令人耳聾五味令人口爽是萬物盗於人而不使之永茂矣斧斤之入山林數罟之入汚池五穀六畜烹飪食啗是人為萬物之盗而不使之長生矣雖然三盗之暗相銷鑠潜互斵喪不知不覺而榮枯生死莫可致詰在天地萬物不足以為害而在人者深所以為害也何以明之天地賊萬物而覆載者常存萬物賊於人而生成者不絶至於人賊萬物本資以養生也而反不能長生乃為萬物所盗哀哉世人能深明此理乎茍能明之自然之所修為守䕶三寳愛養靈珠存三守一精氣神全赫赤金丹輝光充實天地萬物何能為盗於我哉惟其昩於此也乃以人生天地間必資於萬物萬物利於人必資於天地其理固宜也惟其以為宜也則必安之而不以為異也聖人憂之故曰三盗既宜豈非宜耶是悲其互相戕賊而無有終窮也三才既安豈其安耶是憐其鼎分列位而安於相賊也深所以憫世人之不明乎道不能超脱乎造化之表而出死入生棄枯就榮與天地萬物相為終始者也吁此黄帝所以成金丹而登天後賢亦拔宅而上昇者相踵也三盗何加損於有道哉故曰食其時百骸理人之有生四大假合肢節百骸精神血氣非食啗不能充養茍失其時非徒无益而反害之况金丹大道其採亦有時取亦有日其甘如飴其大如橘食之登仙金筋玉骨此其血化為膏膏化為氣氣化為神飛昇金闕奚止百骸理而已乎動其機萬化安天地造化深不可測機緘黙運人身同之茍得其機則動罔不吉萬化雖衆安而不危儻失其機則危殆必矣何安之有人知其神之神不知不神之所以神神之為用大矣哉然有隱有顯有藏有露聖凡自此分也世人但知施設注措言語文章不求而得不思而中以為我之神也殊不知業識忙忙應酬萬變逐物忘返无須臾寧吁熖烈者膏竭芬郁者本枯自速其盡而已何者以其顯露甚也惟聖人内觀反聽塞兑含流隱藏於中鬼神莫測故恍恍惚惚若无知也而其中有物焉杳杳冥冥若不神也而其中有精焉此不神其神乃所以為至神非有道者其孰能與於此日月有數大小有定聖功生焉神明出焉日為太陽月為太隂太陽火魄太隂水魄水火二象昭著隂陽何有數耶盖天有三百六十五度四分度之一日晝夜行一度月晝夜行十三度有竒日行遲故一嵗一周天月行速故一月一周天遲速相盪隂陽相須故有大盡小盡其數一定而不易人之一身亦有日月亦有度數其周天之運不在一年盖蹙年成月蹙月成日於十二時中自然隂陽升降魂魄相生吾有聖功之用必使之烏兎交合龍虎交媾鼓之以雷霆潤之以風雨虛室生白入於无何有之鄉混合囘風得於片晌工夫之際謂之神明出者不知其因神而明因明而神也无中有乃𤣥中之𤣥有中无乃妙中之妙變化萬端淵不可測昭徹萬象洞无所蔽是謂神明不可思議也雖然與天地合德日月合明者即此道也今人但能誦之於口而曽不踐履於身反以神仙為怪誕哀哉其行尸行厠自謂富貴快樂不知夢幻泡影深可悲傷之也其盜機也天下莫能見莫能知君子得之固窮小人得之輕命盗機之喻妙矣哉盗者何不可測知也機者何不可禦遏也夜半負之而去此盗也人孰知之若虞機張此機也人孰遏之然此盗此機能通三才造化得隂陽闔闢一氣流行機緘自應百姓日用而不知惟學道者得之以固窮非特曰守貧窮也凡其浮雲富貴不事肥甘樂清虛從澹泊即固窮之義也小人得之輕命非曰事刀兵也凡其御房採戰嗜酣聲樂飫酒食逞財氣即輕命之謂也雖然固窮輕命既有君子小人之分而盗機之發亦何私於有無也特君子明此機而用之以固窮小人昧此機而用之以輕命耳此理幽𤣥非盟誓不傳故曰天下莫能見莫能知瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍瞽者无明聾者不聰聰明既出視聽何善之有非此之謂也人以耳目為生反以耳目為累聲色亂於前視聽動於中知何者為主也惟瞽者目所不睹則心專於聽而粉白黛緑者不能雜也聾者耳所不聞則心專於視而淫哇鼓吹者不能奪也此用志不分乃凝於神之妙也絶利一源則心无二用專氣致柔而已三返晝夜者乃三宫升降上下往来无窮也用師十倍萬倍者乃精神折衝使邪魔外道非心惡念有不戰而屈之理也夫以棄絶於利慾精一於本源萬累消亡无思无慮精誠純篤一念不差此寂然不動之境也而晝夜之間三宫反覆隂陽升降符節不爽循環无窮此感而遂通之妙也吁此道非見之踐履騐之日用則曷與言哉雖然十倍萬倍其效猶有淺深何也盖黜聰明墮肢體槁木其形死灰其心雖可以定静而入道而弊有釋氏空寂之偏不能運化終為隂靈苦爽鬼而已其效故止十倍也若夫絶利一源而復能三返晝夜自然守真抱一升降三宫晝夜循環靡有暫息天神胥契機應若神不可擬議此與天地合德日月合明其效實無敵也非用師萬倍而何昔魯侯問耳視目之道於亢倉子對曰傳之者妄矣我能視不用耳目不能易耳目之用必使體合於心心合於氣氣合於神神合於無其有介然之色唯然之音雖逺在八荒之外近在目睫之間皆莫能逃吾視聽矣世人儻知亢倉子之視聽則知黄帝聾瞽之視聽也𤣥妙哉心生於物死於物機在目心目相闗生死相因物機相應曽无間斷也人生為萬物之靈日與萬物交際一念之起隨念生於物一念之滅隨念死於物然心非自生於物也其機在目耳心非自死於物也其機亦在目耳使當時黑白不分妍醜不别則心同太虛何由能生死也惟機闗在目觸之而動一覩美色則倐然生愛一見惡色則倐然増惡故愛之而欲心生是此心生於物也惡之而欲心死是此心死於物也原其所自豈是心之本然哉皆其機之在目也故上聖有内觀之經仙家有簾目之法儒之非禮勿視釋之清淨眼根其㫖深其則不逺矣雖然瞽者亦有嗜慾豈機專在目耶故曰心目相闗隂符經講義卷二
