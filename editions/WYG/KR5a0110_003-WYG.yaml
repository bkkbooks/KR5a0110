body:
  text: 隂符經講義卷三宋夏元鼎撰經曰天之无恩而大恩生迅雷烈風莫不蠢然天何心哉四時行焉百物生焉然必風雪凝沍氷霜凛冽而後萬物有歸根復命之理是天之无恩而大恩生矣况迅雷烈風發於春夏而百嘉暢茂凡蠢動含靈莫不戢然遂其生理所謂猛火烈焰之中乃金寳成就之地學者體此當明殺機反覆害裏生恩造无上之𤣥元為天人宗匠也至樂性餘至静則廉情有悲歡性則至樂欲有動作道則至静此仙凡所由分也學者求道先當以性天為樂不使一毫窮通得喪累於其中則恬淡無為廉於持養自然心與道契彼其七情六慾悲歡无常動觸禍機日裹塵網无有出期何性之可樂何静之可廉歟天之至私用之至公天道无私然於金丹也若有所私天心有私然於大道也若无所私何以言之人禀賦於天一㸃靈明真覺之性三昧无為自然之火先天太一含真之精无大无小无貴无賤无仙无凡皆獲具足是天无所私也然而有道者隂陽升降不失其時日月交合不差其候呼雷喚雨振風閃電真能旋乾轉坤驅龍伏虎聖功生焉神明出焉有不可思議之妙无道者反是隂陽失升降之期日月无交合之候雷電風雨自視何有一身所存不為飯囊酒甕則為藥肆淫房是天果私於有道而不私於无道也吾見其有道者長生住世雖數盡而飛仙无道者疾病纒綿速與草木俱腐是天之至私者乃所以極其至公者也可不警歟禽之制在氣萬物有生皆稟一氣禽若至微飛行太空雖知六翮所鼓衆羽所扶倘非一氣之充則亦廢而不舉學者知之則保嗇元和培養神氣使之至大至剛充塞天地而後已詩不云乎鳶飛戾天魚躍於淵氣作之也夫亦近取諸身逺取諸物乎生者死之根死者生之根恩生於害害生於恩欲通造化當知生死之根欲明大道當識恩害之義是理也捨五行造化金丹大道何以明之且金生於巳死於子子為水鄉而金能生水然則金豈真死耶木生於亥死於午午為火地而木又能生火水土生於申死於夘夘為木位而水又能生木是生者死之根死者生之根也然而生死之根固然而恩害之義却異惟金火之造化不可以生死論也龍虎上經曰金火者真藥也丹術著明莫大乎金火且火生於寅死於酉酉為金鄉其火但能尅金豈能生金耶况酉為金旺之鄉而火為就死之地既不能尅之為害而金反以生旺為恩然金亦豈能自生要必資於所生惟土能生金而火却又生土若无戊己不成丹者也嗟夫五行相生相尅至理幽微學者罕知况金丹一説只是喜談樂道曽不深究𤣥㫖再當一一分辯以詔將来且内外二丹不出五行造化獨不曰水火木土之丹而特曰金丹者何也盖天一生水坎為水宫水為萬物之母修真者必當先於坎宫留心也然坎宫之水豈能自生惟金能生之是元始先天之氣從金化生古歌曰用鉛不用鉛須向鉛中作及至用鉛時用鉛還是錯蓋鉛為金母金為水母水為丹母其相生相成之義如此然大道不以相生為用而以相尅為功豈非以金能尅木木歸於盡木能尅土土極於虛土能尅水水混於空水能尅火火終於滅火雖尅金而金曽不壞烟消焰盡金體愈堅參同契曰金入於猛火色不奪精光豈非害生於恩恩生於害乎此其所以謂之金液還丹謂之長生不死謂之返本還源惟只水中金一味而已若肝心脾肺腎精津氣血液其形質全不相干其性命却又相干其理雖有可言其道則不可言蓋有攅簇有和合有藥物有火候有真凡有賔主聖人傳藥不傳火不遇真師莫强猜非插血盟天劃沙文地不許妄授違者殃及九祖禍先一身張平叔傳非人三遭責罰可不鑒歟愚人以天地文理聖我以時物文理哲哲人可以虞愚我以不愚聖人其期我以不期聖愚賢哲同一初耳自其心有廣狹則所造有分量且天地時物咸有文理其法象著明无内无外人能仰觀俯察則克念而作聖克明而作哲然由愚而哲由哲而聖皆自心之廣狹推之故愚能以天地文理之大存於仰觀俯察之間雖至於聖可也吾而梏於時物文理之小察於日用常行之間僅止於哲而已聖哲既分純疵異念愚人既聖在釋謂之直超彼岸見性成佛在道謂之一得永得平地登仙一念之迷既純於愚一念之覺自純於聖惟哲人則不然其初若汲汲於明道而終則復悠悠而慢道茍不加防虞之力則出入无時操存捨亡又將入於愚而不自覺矣我之所希者聖其可以僅哲而復愚乎故我以不愚非特不愚而聖也亦豈特至聖而已也盖惟聖人其期猶有限量之可名是猶梏於天地文理之用也我乃離形去智與道合一而獨超於萬物之表是豈可得而期哉此大而化之之謂聖若難造矣而聖而不可測知之謂神即金丹之大道也論至於此則曰愚曰聖曰哲始也以天地時物之文理而入道終也忘天地時物之文理而得道譬之五行造化萬象森羅皆道之用文字語言瓦礫稊稗皆道之寓凡三千六百門中一一踐履真積力乆月无忘其所能固以限期為驗如顔子之亞聖不違仁於三月之久其餘則日月至焉而已爾若夫孔子之集大成文王之順帝則上下與天地同流者何以期限為哉彼修空寂者曰饒經千萬刼終是落空亡何謂不可期也殊不知身經刼火雖云壞道若虛空能壞無異哉金丹大道肇於太極成於无極用於有窮妙於无窮不可以凡俗語當共神仙子細推也沒水入火自死亡兵水火有焚溺之患刀兵有殺伐之威不待智者皆知所畏避也今乃求沒於水願入於火樂斃於兵曽不病風喪心亦非形格勢禁其事深可憫惻何也彼酒色財氣乃水火刀兵之異名人皆焚溺自盡於中曽不知懼且嗤學道者徒清修齋戒縱與彭耼同年亦謾孤苦一世曷若我酒色為樂乎噫飛蛾撲燈難以遮䕶特為長嘆息而已自然之道靜故天地萬物生天地之道浸故隂陽勝隂陽相推變化順矣是故聖人知自然之道不可違因以制之太上曰萬物芸芸各歸其根歸根曰靜靜曰復命又曰致虚極守靜篤萬物並作吾以觀其復且至虛至靜體疑於隂萬物從何而生然隂不極則陽不生靜不極則道不見况大道无形生育天地大道无名長養萬物倘不法於自然處於至静則天地萬物決不能生人以一身參天地萬物之用得不知所謂静乎惟其心猿意馬日放縱於利慾之場視天地萬物生成之理於己何哉况天地之道若浸潤焉自一陽而浸至於六陽自一隂而浸至於六隂皆以漸而長未有驟而進也故隂陽相推順自然之理惟聖人知其然也則无為中有為至動中至静使天地萬物因静而生非有道者孰能知之至静之道律歴即不能契鳥獸之謂也律歴之法推算天紀有七十二候有二十四氣有四時八節有晦朔弦望皆度數不可違也然治歴明時推步纎悉疑非自然无為之理也惟聖人道極至靜心同太虚隂陽升降運化自然曽无一毫造作若律歴之多事得非鳥獸之謂乎蓋鳥獸者烏兎也烏兎者日月也日月者水火也水火者隂陽也隂陽者天地也天地者清静无為自然之大道也大道者即窮理盡性以至於命之學也性命者即長生不死金丹之方也爰有竒器是生萬象八卦甲子神機鬼藏隂陽相勝之術昭昭然進乎象矣大哉道乎至哉言乎隂符聖經皆黄帝闡道秘言予輒不揆解釋其義妄泄天機載觀末後數語總括始終亦猶乾坤之彖辭備六十四卦之大義其探賾索隱鈎深致逺未易揣摩猗歟休哉敢再拜薰染而詳明之且金丹大道其於一身有竒器焉非必鑄冶也偃月之爐太乙之竈无内无外之鼎至靈至聖之藥是生萬象皆出自然洞賔謂一粒粟中藏世界半升鐺内煮山川豈虚語乎故以八卦言之則坎離為本以周天言之則子位為先其機之神也則妙用无方其鬼之藏也則隱顯莫測隂勝陽則水火為既濟陽勝隂則日月為合璧金烏有搦兎之功水龍有伏虎之德龜蛇交頸蚌含珠懸象昭昭殆不可掩得非充實而有光輝之謂大大而化之之謂聖聖而不可測知之謂神者乎是道也即吾儒分内事也昩者謂金丹為異端曲學是猶坐井觀天而曰天小者豈天之罪哉隂符經講義卷三
