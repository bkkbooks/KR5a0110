front:
  text: 黄帝陰符經講義卷之一二同卷
  hash: sha256:4198facceeadf7c19e5e306c798062530b0ccede1327e840a2679eaa70168955
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0110_SJB_001-020722b, image: sjb/02/020722b.png}
body:
  text: 雲峯散人夏元鼎宗禹譔經曰觀天之道執天之行盡矣天命之謂性率性之謂道道也者非可仰求於冥漠之表也天道在吾身我能盡其觀之之妙則目擊道存至道不繁矣要當執天之行須臾不離於十二時中一語一默一呼一吸陰開陽闢西没東升風雲發泄於七竅坎離交會於元宫天以是道而運行乎萬化我以是道而操履於一身寒暑同其往來日月與之交合乾健以之不息日用自然無窮不知我之爲天而天爲之我也所謂我命在我不在天其以是乎謂之盡矣不可以有加矣天有五賊見之者昌五賊者五行也人禀五行於天天有五賊於人是豈天不仁耶非也行顛倒大道生焉順則成人逆爲丹用如金木必欲交并水火必欲既濟土旺四季而復以尅水爲功是五行相賊道之玄奥世人安得見此理乎故見之者昌亦誠則明明則著虚室生白充實而有光輝之妙也既曰觀天之道又曰見天之昌聖人揭大道以示人昧者當面蹉過惜哉五賊在心施行于天五行五賊其理幽微心爲天君實能主宰此施行于天皆在吾心之用蓋心即天也天即心也人能即一心之天以竊造化之妙即動靜陟降在帝左右而施行之際未知其敦爲天敦爲心也宇宙在乎手手爲三關之要學道者當知所先矣黄庭經曰口爲心關精神機足爲命關生地扉手爲人關把盛衰得非以手者能按天象方隅推五運六氣握固以養和彈指以攝化診視以知陰陽之候訣目以通鬼神之靈无一而不在手也宇宙六合廣大无際茍得玄妙其猶示諸掌乎參同序曰運六十四卦之陰符天關在掌是也萬化生乎身人之一身一天地也有陰陽升降有烏兔出没有潮候往來有風雨明晦有雷電轟閃有雲氣吐吞有山河流峙有草木榮枯動靜語默闔闢變化无一不與天相似信乎萬化所由生也然有道者萬化生无道者萬化息生者與天爲徒而息者與鬼爲鄰也可不自愛乎天性人也人心機也立天之道以定人也天人一心機道同轍自六慾七情有以奪其性眞則業識火熾不知其孰爲天敦爲人又敦爲機孰爲道也上聖洪慈闡明奥旨謂性即天也天即人也至理渾融不可致詰必得其機而應之則自然脗合是機也豈世俗機巧變詐之爲乎非也乃機緘之運不疾而速機關之應若合符節耳人能明此之機心同造化自然機應不失則天道立矣人道定矣固非曰捨人道而别立天道亦非曰先立天道而後定人道也蓋人道即天道天道即天機天機即天性所謂存其心養其性所以事天也天發殺機龍蛇起陸地發殺機星辰隕伏人發殺機天地反覆天人合發萬化定基三才異位生殺同機然殺者乃所以生之而生者乃所以殺之也且陰疑於陽必戰其血玄黄是殺機之所寓也況三陽交泰萬彙咸亨天發殺機下除陰邪之炁則雷轟電掃天威赫然龍蛇蟄藏不容不起陸於陽盛之時地發殺機上承陽剛之運則湧泉起浪黄河逆流北斗杓躔不容不旋伏於陰陽交勝之際人識此機則潜奪造化旋乾轉坤翻天覆地使地天交而爲泰生殺定而爲功太白眞人歌曰五行顛倒術龍從火裏出五行不順行虎向水中生反覆之機也雖然天地與人列爲三才生殺與機同於一氣孟子曰我善養吾浩然之氣充塞乎天地之間亦豈捨吾身之外而别有天地可充塞乎故知一氣之運非以在天者有餘而在人者不足天人合發不差毫釐機緘默應變化萬端丹基一定大道滋生矣性有巧拙可以伏藏形色天性也而技巧出焉伏藏待時也而天機寓焉有是性則有是機非曰終於伏藏而无所用心也所謂懷材養浩明時正金丹之秘旨也或謂陰鉛主伏陽汞主飛聖人伏陽汞以鍊陰魄故有大巧若拙之用非也殊不知黄帝專言巧拙者在性伏藏者待時蓋以性則合於玄元而鉛汞則拘於形質茍此性靈明陽魂日盛巧拙莫蔽伏藏待時天機一應則天性見矣此正洞賓謂七返還丹在人先須鍊己待時也知待時之說則知伏藏巧拙之性矣九竅之邪在乎三要可以動靜人身九竅上七下二無非邪穢學道者審此必攝乎三要然後動靜有无邪之思三要者何耳目口是也參同契云三寶固塞勿發揚三者既關鍵動靜不竭窮人能謹此三要則天下之聲萬變而坎之聰不爲所奪天下之色萬變而離之明不爲所蔽天下之味萬變而兊之納不爲所亂自然清明在躬志氣如神動靜之間一循天理之正雖萬邪不能干矣九竅之邪何有於我哉此正非禮勿視非禮勿聽非禮勿言之道豈異端乎火生於木禍發必尅姦生於國時動必潰知之修鍊謂之聖人木能生火終於自焚國若生姦終於召亂此勢所必致之患學道者知之使火生於木而木不焚姦生於國而國不亂譬猶飲食男女人之大欲存焉固不可以其姦邪而屏絶之也苟縱是欲則何所不爲惟以道而制之則火木相生不爲禍而爲福姦邪雖動不爲邪而爲正豈非聖人修鍊之道乎所謂居塵不染出死入生者也然木火相生於五行爲最盛人身五行視木火爲盛衰如眞元不虧則木火熾然潜應天機常人縱之以傷生是輕命恣姦也聖人鍊之以成道是返歸正也苟眞元衰敗則木火滅矣天道缺矣人道遠而鬼道近矣哀哉黄帝陰符經講義卷之一
