front:
  text: 黄帝陰符經講義卷之三藏八
  hash: sha256:fdb060b7a5b2773a7bf01a5dc3a41a014546baaa09d0bb4dba2779c45931ed73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0110_SJB_003-020727b, image: sjb/02/020727b.png}
body:
  text: 雲峰散人夏元鼎宗禹譔經曰天之无恩而大恩生迅雷烈風莫不蠢然天何心哉四時行焉百物生馬然必風雪凝沍冰霜凛冽而後萬物有歸根復命之理是天之无恩而大恩生矣況迅雷烈風發於春夏而百嘉暢茂凡蠢動含靈莫不戢然遂其生理所謂猛火烈焰之中乃金寶成就之地學者體此當明殺機反覆害裏生恩造无上之玄元爲天人宗匠也至樂性餘至靜則廉情有悲歡性則至樂欲有動作道則至靜此仙凡所由分也學者求道先當以性天爲樂不使一毫窮通得喪累於其中則甜淡无爲廉於持養自然心與道契彼其七情六慾悲歡无常動觸禍機日褁塵網无有出期何性之可樂何靜之可廉歟天之至私用之至公天道无私然於金丹也若有所私天心有私然於大道也若无所私何以言之人禀賦於天一點靈明眞覺之性三昧无爲自然之火先天太一含眞之精无大无小无貴无賤无仙无凡皆獲具足是天无所私也然而有道者陰陽升降不失其時日月交合不差其候呼雷唤雨振風閃電眞能旋乾轉坤驅龍伏虎聖功生焉神明出焉有不可思議之妙無道者反是陰陽失升降之期日月无交合之候雷電風雨自視何有一身所存不爲飯囊酒甕則爲藥肆淫房是天果私於有道而不私於无道耶吾見其有道者長生住世雖數盡而飛仙无道者疾病纏綿速與草木俱腐是天之至私者乃所以極其至公者也可不警歟禽之制在氣萬物有生皆禀一氣禽若至微飛行太空雖知六翮所鼔衆羽所扶儻非一氣之充則亦廢而不舉學者知之則保嗇元和培養神氣使之至大至剛充塞天地而後已詩不云乎鳶飛戾天魚躍于淵氣作之也夫亦近取諸身遠取諸物乎生者死之根死者生之根恩生於害害生於恩欲通造化當知生死之根欲明大道當識恩害之義是理也捨五行造化金丹大道何以明之且金生於巳死於子子爲水郷而金能生水然則金豈眞死耶木生於亥死於午午爲火地而木又能生火水土生於申死於卯卯爲木位而水又能生木是生者死之根死者生之根也然而生死之根固然而恩害之義却異惟金火之造化不可以生死論也龍虎上經曰金火者眞藥也丹術著明莫大乎金火且火生於寅死於酉酉爲金郷其火但能尅金豈能生金耶況酉爲金旺之郷而火爲就死之地既不能尅之爲害而金反以生旺爲恩然金亦豈能自生要必資於所生惟土能生金而火却又生土若无戊己不成丹者也嗟夫五行相生相尅至理幽微學者罕知况金丹一說只是喜談樂道曾不深究玄旨再當一一分辯以詔將來且内外二丹不出五行造化獨不曰水火木土之丹而特曰金丹者何也蓋天一生水坎爲水宫水爲萬物之母修眞者必當先於坎宫留心也然坎宫之水豈能自生惟金能生之是元始先天之氣從金化生古歌曰用鉛不用鉛须向鉛中作及至用鉛時用鉛還是錯蓋鉛爲金母金爲水母水爲丹母其相生相成之義如此然大道不以相生爲用而以相尅爲功豈非以金能尅木木歸於盡木能尅土土極於虚土能尅水水混於空水能尅火火終於滅火雖尅金而金曾不壞煙消焰盡金體愈堅參同契曰金入於猛火色不奪精光豈非害生恩恩生於害乎此其所以謂之金液還丹謂之長生不死謂之返本還源惟只水中金一味而已若肝心牌肺腎精津氣血液其形質全不相干其性命却又相干其理雖有可言其道則不可言蓋有攢簇有合和有藥物有火候有眞凡有賓主聖人傳藥不傳火不遇眞師莫强猜非歃血盟天劃沙文地不許妄授違者殃及九祖禍先一身張平叔傳非人三遭責罰可不鑒歟愚人以天地文理聖我以時物文理哲哲人可以虞愚我以不愚聖人其期我以不期聖愚賢哲同一初耳自其心有廣狹則所造有分量且天地時物咸有文理其法象著明无内无外人能仰觀俯察則克念而作聖克明而作哲然由愚而哲由哲而聖皆自心之廣狹推之故愚能以天地文理之大存於仰觀俯察之間雖至於聖可也吾而梏於時物文理之小察於日用常行之間僅止於哲而已聖哲既分純疵異念愚人既聖在釋謂之直超彼岸見性成佛在道謂之一得永得平地登仙一念之迷既純於愚一念之覺自純於聖惟哲人則不然其初若汲汲於明道而終則復悠悠而慢道茍不加防虞之力則出入无時操存捨亡又將入於愚而不自覺矣我之所希者聖其可以僅哲而復愚乎故我以不愚非特不愚而聖也亦豈特至聖而已也蓋聖人其期猶有限量之可名是猶梏於天地文理之用也我乃離形去智與道合一而獨超於萬物之表是豈可得而期哉此大而化之之謂聖若難造矣而聖而不可測知之謂神即金丹之大道也論至於此則曰愚曰聖曰哲始也以天地時物之文理而入道終也忘天地時物之文理而得道譬之五行造化萬象森羅皆道之用文字語言瓦礫稊稗皆道之寓凡三千六百門中一一踐履眞積力乆月无忘其所能固以限期爲驗如顔子之亞聖不違仁於三月之乆其餘則日月至焉而已爾若夫孔子之集大成文王之順帝則上下與天地同流者何以期限爲哉彼修空寂者曰饒君經萬劫終是落空亡何謂不可期也殊不知身經劫火雖云壞道若虚空能壞无異哉金丹大道肇於太極成於无極用於有窮妙於无窮不可以凡俗語當共神仙子細推也没水入火自死亡兵水火有焚溺之患刀兵有殺伐之威不待智者皆知所畏避也今乃求没於水願入於火樂斃於兵曾不病風喪心亦非形格勢禁其事深可憫惻何也彼酒色財氣乃水火刀兵之異名入皆焚溺自盡於中曾不知懼且嗤學道者徒清修齋戒縱與彭聃同年亦謾孤苦一世曷若我酒色爲樂乎噫飛蛾撲燈難以遮護特爲長嘆息而已自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推變化順矣是故聖人知自然之道不可違因以制之太上曰萬物芸芸各歸其根歸根曰靜靜曰復命又曰致虚極守靜篤萬物並作吾以觀其復且至虚至靜體疑於陰萬物從何而生然陰不極則陽不生靜不極則道不見況大道无形生育天地大道无名長養萬物儻不法於自然處於至靜則天地萬物决不能生人以一身參天地萬物之用得不知所謂靜乎惟其心猿意馬日放縱於利慾之場視天地萬物生成之理於己何哉況天地之道君浸潤焉自一陽而浸至於六陽自一陰而浸至於六陰皆以漸而長未有驟而進也故陰陽相推皆順自然之理惟聖人知其然也則无爲中有爲至動中至靜使天地萬物因靜而生非有道者孰能知之至靜之道律歷即不能契鳥獸之謂也律歷之法推筭天紀有七十二候有二十四氣有四時八節有晦朔弦望皆度數不可違也然治歷明時推步纎悉疑非自然无爲之理也惟聖人道極至靜心同太虚陰陽升降運化自然曾无一毫造作若律歷之多事得非鳥獸之謂乎蓋鳥獸者烏兔也烏兔者日月也日月者水火也水火者陰陽也陰陽者天地也天地者清靜无爲自然之大道也大道者即窮理盡性以至於命之學也性命者即長生不死金丹之方也爰有奇器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭然進乎象矣大哉道乎至哉言乎陰符聖經皆黄帝闡道秘言予輒不揆解釋其義妄泄天機載觀末後數語總括始終亦猶乾坤之彖辭備六十四卦之大義其探賾索隱鈎深致遠未易揣摩猗歟休哉敢再拜熏染而詳明之且金丹大道其於一身有竒器焉非必鑄冶也偃月之爐太一之竈无内无外之鼎至靈至聖之藥是生萬象皆出自然洞賓謂一粒粟中藏世界三升鐺内煮山川豈虚語乎故以八卦言之則坎離爲本以周天言之則子爲先其機之神也則妙用无方其鬼之藏也則隱顯莫測陰勝陽則水火爲既濟陽勝陰則日月爲合璧金烏有搦兔之功木龍有伏虎之德龜蛇交頸蚌𧑐含珠懸象昭昭殆不可掩得非充實而有光輝之謂大大而化之之謂聖聖而不可測知之謂神者乎是道也即吾儒分内事也昧者謂金丹爲異端曲學是猶坐井觀天而曰天小者豈天之罪哉黄帝陰符經講義卷之三
